<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dubai Importaciones – Lista de Precios</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-dark: #8A6A1F;
      --bg: #0A0A0F;
      --bg2: #111118;
      --bg3: #1A1A24;
      --text: #F0EDE6;
      --text-muted: #7A7888;
      --border: rgba(201,168,76,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%),
        repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.025) 40px, rgba(201,168,76,0.025) 41px);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative; z-index: 1;
      text-align: center;
      padding: 56px 24px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin-bottom: 16px;
    }
    .logo-ornament span {
      display: block; height: 1px; width: 80px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .logo-ornament span:last-child { background: linear-gradient(to left, transparent, var(--gold)); }
    .logo-diamond { width: 10px; height: 10px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-muted); margin-top: 10px;
    }

    .tc-bar {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 16px 24px;
      background: var(--bg3); border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tc-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .tc-value { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold-light); font-weight: 700; }
    .tc-badge {
      font-size: 0.7rem; color: var(--gold);
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 20px; padding: 3px 12px; letter-spacing: 0.12em;
    }

    .loading-screen {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 20px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }

    .error-box {
      position: relative; z-index: 1;
      max-width: 500px; margin: 60px auto; padding: 28px;
      background: var(--bg2); border: 1px solid rgba(220,80,80,0.3);
      border-radius: 12px; text-align: center;
    }
    .error-box h3 { color: #F07070; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
    .error-box p { font-size: 0.82rem; color: var(--text-muted); line-height: 1.7; }

    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    .category { margin-bottom: 56px; }
    .category-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .category-title {
      font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
      color: var(--gold-light); white-space: nowrap;
    }
    .category-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
      position: relative; overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0; transition: opacity 0.25s;
    }

    .card:hover { transform: translateY(-4px); border-color: rgba(201,168,76,0.45); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
    .card:hover::before { opacity: 1; }

    .card-brand { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .card-model { font-size: 1.05rem; font-weight: 500; color: var(--text); margin-bottom: 20px; line-height: 1.3; }

    .card-prices { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

    .price-usd { display: flex; flex-direction: column; gap: 2px; }
    .price-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .price-usd .amount { font-family: 'Playfair Display', serif; font-size: 1.55rem; font-weight: 700; color: var(--gold-light); line-height: 1; }

    .price-divider { width: 1px; height: 36px; background: var(--border); align-self: flex-end; margin-bottom: 2px; }

    .price-ars { display: flex; flex-direction: column; gap: 2px; }
    .price-ars .amount { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1; }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 28px 24px; text-align: center; }
    .footer-note { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.08em; line-height: 1.8; }

    .sync-dot {
      display: inline-block; width: 7px; height: 7px;
      background: #6EDBA8; border-radius: 50%; margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .filters-wrap {
      position: relative; z-index: 1; max-width: 1100px; margin: 24px auto 0; padding: 0 24px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .filters-wrap input, .filters-wrap select {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      padding: 12px 14px; border-radius: 10px; font-family: 'Barlow', sans-serif;
    }
    .filters-wrap input { flex: 1; min-width: 260px; }
    .filters-wrap button {
      background: rgba(201,168,76,.12); color: var(--gold-light);
      border: 1px solid rgba(201,168,76,.3); padding: 12px 16px; border-radius: 10px; cursor: pointer;
    }

    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 2rem; } }
  </style>
</head>
<body>

<header>
  <div class="logo-ornament">
    <span></span><div class="logo-diamond"></div><span></span>
  </div>
  <h1>DUBAI IMPORTACIONES</h1>
  <p class="header-sub">Lista de precios oficial &nbsp;·&nbsp; Smartphones</p>
</header>

<div class="tc-bar" id="tcBar" style="display:none">
  <span class="tc-label">Tipo de cambio</span>
  <span class="tc-value" id="tcValue">—</span>
  <span class="tc-badge"><span class="sync-dot"></span>Actualizado</span>
</div>

<div class="filters-wrap" id="filtersBar" style="display:none">
  <input type="text" id="searchInput" placeholder="Buscar modelo...">
  <select id="brandFilter">
    <option value="">Todas las marcas</option>
  </select>
  <button id="clearFilters">Limpiar</button>
</div>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p class="loading-text">Cargando precios…</p>
</div>

<div class="error-box" id="errorBox" style="display:none">
  <h3>No se pudieron cargar los precios</h3>
  <p>Ocurrió un error al obtener los datos. Por favor intentá de nuevo más tarde.</p>
</div>

<main id="mainContent" style="display:none"></main>

<footer>
  <p class="footer-note">Dubai Importaciones &copy; 2025</p>
</footer>

<script>
  const SHEET_ID = "1NzYu2WBVc0JiYDmA_SYF-s1_jHmw63lR51zNXDWu29A";

  // ✅ Variables en scope global para que applyFilters las vea
  let allProducts = [];
  let currentTC = 0;

  function csvUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  }

  async function fetchCSV(sheetName) {
    const res = await fetch(csvUrl(sheetName));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    return parseCSV(text);
  }

  function parseCSV(text) {
    return text.trim().split("\n").map(line => {
      const cols = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
        else { cur += c; }
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  function fmt(n) {
    return Math.round(n).toLocaleString("es-AR");
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showError() {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("errorBox").style.display = "block";
  }

  function renderProducts(products, tc) {
    const grouped = {};
    for (const p of products) {
      if (!grouped[p.categoria]) grouped[p.categoria] = [];
      grouped[p.categoria].push(p);
    }

    const main = document.getElementById("mainContent");
    main.innerHTML = "";

    for (const [cat, items] of Object.entries(grouped)) {
      const cards = items.map(p => {
        const ars = p.usd * tc;
        return `
          <div class="card">
            <div class="card-brand">${escHtml(cat)}</div>
            <div class="card-model">${escHtml(p.modelo)}</div>
            <div class="card-prices">
              <div class="price-usd">
                <span class="price-label">USD</span>
                <span class="amount">$${fmt(p.usd)}</span>
              </div>
              <div class="price-divider"></div>
              <div class="price-ars">
                <span class="price-label">ARS</span>
                <span class="amount">$${fmt(ars)}</span>
              </div>
            </div>
          </div>`;
      }).join("");

      const section = document.createElement("section");
      section.className = "category";
      section.innerHTML = `
        <div class="category-header">
          <h2 class="category-title">${escHtml(cat)}</h2>
          <div class="category-line"></div>
        </div>
        <div class="grid">${cards}</div>`;
      main.appendChild(section);
    }
  }

  // ✅ applyFilters usa las variables globales sin problema
  function applyFilters() {
    const texto = document.getElementById("searchInput").value.toLowerCase();
    const marca = document.getElementById("brandFilter").value;

    const filtrados = allProducts.filter(p =>
      p.modelo.toLowerCase().includes(texto) &&
      (!marca || p.categoria === marca)
    );

    renderProducts(filtrados, currentTC);
  }

  async function init() {
    try {
      const configRows = await fetchCSV("Configuracion");
      const tcRow = configRows[1];
      const tc = parseFloat(tcRow[1].replace(/[^0-9.,]/g, "").replace(",", "."));
      if (isNaN(tc) || tc <= 0) throw new Error("Tipo de cambio inválido");

      currentTC = tc; // ✅ asignar a variable global
      document.getElementById("tcValue").textContent = `USD 1 = $${fmt(tc)} ARS`;
      document.getElementById("tcBar").style.display = "flex";

      const prodRows = await fetchCSV("Productos");
      for (let i = 1; i < prodRows.length; i++) {
        const row = prodRows[i];
        if (!row || row.length < 3) continue;
        const categoria = row[0].trim();
        const modelo    = row[1].trim();
        const precioRaw = row[2].replace(/[^0-9.,]/g, "").replace(",", ".");
        const usd       = parseFloat(precioRaw);
        if (!categoria || !modelo || isNaN(usd)) continue;
        allProducts.push({ categoria, modelo, usd }); // ✅ asignar a variable global
      }

      if (allProducts.length === 0) throw new Error("Sin productos");

      const marcas = [...new Set(allProducts.map(p => p.categoria))].sort();
      const brandFilter = document.getElementById("brandFilter");
      marcas.forEach(m => {
        brandFilter.innerHTML += `<option value="${m}">${m}</option>`;
      });

      document.getElementById("filtersBar").style.display = "flex";

      renderProducts(allProducts, currentTC);

      document.getElementById("searchInput").addEventListener("input", applyFilters);
      document.getElementById("brandFilter").addEventListener("change", applyFilters);
      document.getElementById("clearFilters").addEventListener("click", () => {
        document.getElementById("searchInput").value = "";
        document.getElementById("brandFilter").value = "";
        applyFilters();
      });

      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";

    } catch (e) {
      console.error(e);
      showError();
    }
  }

  init();
</script>
</body>
</html>
